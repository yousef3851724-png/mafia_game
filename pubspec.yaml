name: mafia_radical
description: "بازی موبایل مافیا رادیکال - اپلیکیشن گرداننده و بازی حرفه‌ای مافیا"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ---------- State Management ----------
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ---------- Routing ----------
  go_router: ^14.2.0

  # ---------- Local Database ----------
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.3

  # ---------- Storage ----------
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # ---------- UI / Theme ----------
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  cached_network_image: ^3.3.1

  # ---------- Utils ----------
  equatable: ^2.0.5
  uuid: ^4.4.0
  intl: ^0.19.0
  vibration: ^2.0.0
  audioplayers: ^6.0.0
  wakelock_plus: ^1.2.5
  share_plus: ^9.0.0
  package_info_plus: ^8.0.0

  # ---------- Logging ----------
  logger: ^2.3.0

  # ---------- Dependency Injection ----------
  get_it: ^7.7.0

  # ---------- Networking (برای حالت آنلاین آینده) ----------
  dio: ^5.4.3+1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/
    - assets/fonts/

  fonts:
    - family: Vazirmatn
      fonts:
        - asset: assets/fonts/Vazirmatn-Regular.ttf
        - asset: assets/fonts/Vazirmatn-Bold.ttf
          weight: 700
        - asset: assets/fonts/Vazirmatn-Medium.ttf
          weight: 500

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#0D0B14"
  adaptive_icon_foreground: "assets/images/app_icon_fg.png"

flutter_native_splash:
  color: "#0D0B14"
  image: assets/images/splash_logo.png
  android_12:
    color: "#0D0B14"
    image: assets/images/splash_logo.png
